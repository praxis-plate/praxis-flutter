name: codium
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  go_router: ^16.2.1
  get_it: ^8.2.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  talker_flutter: ^5.0.1
  talker_dio_logger: ^5.0.1
  talker_bloc_logger: ^5.0.1
  flutter_markdown: ^0.7.7
  formz: ^0.8.0
  decimal: ^3.0.2
  intl: any
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
flutter_intl:
  enabled: true
