name: codium
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  go_router: ^17.0.0
  get_it: ^9.0.5
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  talker_flutter: ^5.0.1
  talker_dio_logger: ^5.0.1
  talker_bloc_logger: ^5.0.1
  flutter_markdown: ^0.7.7
  formz: ^0.8.0
  decimal: ^3.0.2
  intl: any
  flutter_localizations:
    sdk: flutter
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.3
  dio: ^5.4.0
  google_generative_ai: ^0.4.7
  pdfx: ^2.6.0
  file_picker: ^10.3.6
  envied: ^1.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  drift_dev: ^2.14.0
  envied_generator: ^1.3.1
  build_runner: ^2.4.7
  
  # Testing
  mockito: ^5.4.4
  bloc_test: ^10.0.0

flutter:
