name: codium
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  go_router: ^14.6.2
  get_it: ^8.0.3
  flutter_bloc: ^8.1.6
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  intl: ^0.19.0
  talker: ^4.5.5
  talker_flutter: ^4.5.5
  flutter_markdown: ^0.7.4+3
  supabase_flutter: ^2.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
flutter_intl:
  enabled: true
