name: codium
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  go_router: ^17.0.0
  get_it: ^9.0.5
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  talker_flutter: ^5.0.1
  talker_dio_logger: ^5.0.1
  talker_bloc_logger: ^5.0.1
  flutter_markdown: ^0.7.7
  formz: ^0.8.0
  decimal: ^3.0.2
  intl: any
  flutter_localizations:
    sdk: flutter
  drift: ^2.14.0
  path_provider: ^2.1.5
  path: ^1.8.3
  dio: ^5.4.0
  envied: ^1.3.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.10+1
  crypto: ^3.0.3
  mocktail: ^1.0.4
  praxis_client:
    path: packages/praxis_client
  serverpod_auth_core_client: 3.2.0
  serverpod_auth_core_flutter: 3.2.0
  serverpod_auth_idp_client: 3.2.0
  serverpod_client: 3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

  # Code Generation
  drift_dev: ^2.14.0
  envied_generator: ^1.3.1
  build_runner: ^2.4.7

  # Testing
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  intl_utils: ^2.8.12

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/currency/
    - assets/prompts/
flutter_intl:
  enabled: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon1024.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/splash-screen-icon1152.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/icons/splash-screen-icon1152.png
